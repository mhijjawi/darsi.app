<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Darsi - Redirecting...</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s to the app root so client-side routing can handle them
    var basePath = '/darsi.app';
    var path = window.location.pathname;

    // If path has doubled basePath, fix it
    if (path.indexOf(basePath + basePath) === 0) {
      path = path.replace(basePath + basePath, basePath);
      window.location.replace(path);
    } else {
      // Redirect to app root
      window.location.replace(basePath + '/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
